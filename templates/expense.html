<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Budget Tracker</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">

    <link rel="stylesheet" href="https://code.jquery.com/ui/1.14.1/themes/base/jquery-ui.css">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script src="https://code.jquery.com/ui/1.14.1/jquery-ui.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="{{ url_for('static', filename='expense.js') }}" defer></script>


</head>

<body>
    <div id = "tabs">
        <ul>
            <li> <a href = "#tab-1">Add Income</a></li>
            <li> <a href = "#tab-2">Add Expense</a></li>
            <li> <a href = "#tab-3">View info</a></li>
        </ul>
    
        <div id = "tab-1"> 
            <form id = "incomeform">
                <label for="amount">Income:</label>
                <span>$</span>
                <input type="number" id="Income" name="Income"  min="0" required>
                <button type="submit">Add Income</button>
            </form>
            
        </div>

         
        <div id="tab-2">

            <form id="expenseform">
        
                <label for="category">Category:</label>
        
                <select id="category" name="category" required>
        
                    <option value="">Select a category</option>
                    <option value="Needs">Needs</option>
                    <option value="Wants">Wants</option>
                    <option value="Savings">Savings</option>
        
                </select>
        
                <br><br>
        
                <label for="description">Description:</label>
        
                <input 
                    type="text"
                    id="description"
                    name="description"
                    placeholder="Example: Rent"
                    required
                >
        
                <br><br>
        
                <label for="amount">Amount:</label>
        
                <span>$</span>
        
                <input 
                    type="number"
                    id="amount"
                    name="amount"
                    min="0"
                    required
                >
        
                <br><br>
        
                <button type="submit">
                    Add Expense
                </button>
        
            </form>
        
        </div>

        <div id="tab-3">

            <div class="info-container">
        
                <div class="chart-container">
                    <canvas id="expenseChart"></canvas>
                </div>
        
        
                <div id="expenseBreakdown">
                    <h3>Expense Breakdown</h3>
                    <!-- JavaScript will put expenses here -->
                </div>
        
            </div>
        
        
            <div id="remaining">
                Remaining: $0
            </div>
        
        </div>
            
    </div> 
</body>
</html>
