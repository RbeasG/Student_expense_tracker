<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container mt-5">
        <h1>Welcome to our finance tracker! :)</h1>

    </div>
    <div class="row">
        <div class="col-sm-6 mb-3 mb-sm-0">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">Income</h5>
                    <p class="card-text">Please enter your monthly income.</p>
                    <input class="form-control form-control-lg" type="text" placeholder="$0.00"
                        aria-label=".form-control-lg example">
                    <br>
                    <a href="#" id="incomeBtn" class="btn btn-primary">Add income</a>
                </div>
            </div>
        </div>
        <div class="col-sm-6">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">Expenses</h5>
                    <p class="card-text">Please enter your expenses.</p>
                    <input class="form-control form-control-lg" type="text" placeholder="$0.00"
                        aria-label=".form-control-lg example">
                        <br>
                    <a href="#" id="needBtn" class="btn btn-primary">Add need</a>
                    <a href="#" id="wantBtn" class="btn btn-primary">Add want</a>
                    <a href="#" id="saveBtn" class="btn btn-primary">Add Savings</a>
                </div>
            </div>
        </div>
    </div>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- Bootstrap Bundle JS (includes Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Your script (must load after jQuery) -->
    <script src="script.js"></script>

</body>

</html>
